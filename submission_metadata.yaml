ai_usage_summary: |
  ChatGPT and Claude were used as development assistants for brainstorming,
  architecture discussions, debugging, code refactoring, documentation, UI
  improvements, and presentation preparation. All core design decisions,
  implementation, testing, and validation were performed by the team. No
  candidate data was sent to hosted AI services during ranking or inference.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  We developed an AI-powered Recruiter Intelligence Engine that evaluates
  candidates using demonstrated capabilities rather than keyword matching.
  The pipeline converts every Job Description into a structured Hiring
  Profile, extracts recruiter-centric candidate features, performs
  evidence-based capability inference, computes semantic similarity using
  TF-IDF and Truncated SVD, generates multi-dimensional recruiter
  intelligence scores, and applies LightGBM LambdaMART for Learning-to-Rank
  optimization. A cohort differentiation module explains tie-breaking
  decisions, while an explainability engine provides recruiter reasoning,
  confidence scores, strengths, concerns, and supporting evidence for every
  shortlisted candidate. The complete pipeline runs entirely on CPU without
  external APIs and successfully processes 100,000 candidates within the
  competition constraints.

